<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmation · Caravane Universitaire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #e8b931;
      --deep-blue: #0d1f4a;
      --white: #f9f5ec;
      --green: #27ae60;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--deep-blue);
      color: var(--white);
      min-height: 100vh;
      position: relative; 
      overflow-x: hidden;
    }

    /* ── BACKGROUNDS ─────────────────────────────────────── */
    .bg-slide {
      position: fixed; inset: 0; z-index: 0;
      background-size: cover; background-position: center;
    }
    .bg-slide.s1 { background-image: url('images/uam.jpg'); animation: bgFade 12s ease-in-out infinite; }
    .bg-slide.s2 { background-image: url('images/thies.jpg'); animation: bgFade2 12s ease-in-out infinite; animation-delay: 6s; }
    @keyframes bgFade { 0%,45%{opacity:1}55%,100%{opacity:0} }
    @keyframes bgFade2 { 0%,45%{opacity:0}55%,100%{opacity:1} }

    .bg-overlay {
      position: fixed; inset: 0; z-index: 1;
      background: linear-gradient(160deg, rgba(13,31,74,0.88), rgba(5,15,30,0.92));
    }

    /* ── SHEEP RAIN CONTAINER ─────────────────────────────── */
    #sheepRain {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .sheep {
      position: absolute;
      font-size: 2.2rem;
      animation: fall linear forwards;
      user-select: none;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
      opacity: 0.95;
    }

    @keyframes fall {
      to {
        transform: translateY(105vh) rotate(720deg);
      }
    }

    /* ── TABASKI MESSAGE ─────────────────────────────────── */
    .tabaski-message {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.4rem, 5vw, 2.1rem);
      font-weight: 800;
      color: #ffeb3b;
      text-shadow: 
        0 0 20px #ffeb3b,
        0 0 40px #e8b931,
        3px 3px 0 #0d1f4a;
      margin: 20px 0 8px;
      animation: tabaskiPop 1.2s cubic-bezier(0.34,1.56,0.64,1) both;
      letter-spacing: 2px;
    }

    @keyframes tabaskiPop {
      0% { transform: scale(0.3) rotate(-12deg); opacity: 0; }
      60% { transform: scale(1.15) rotate(8deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .emoji-blast {
      font-size: 2.8rem;
      animation: emojiFloat 3s ease-in-out infinite alternate;
    }

    /* ── PAGE ──────────────────────────────────────────────── */
    .page {
      position: relative; 
      z-index: 2;
      min-height: 100vh;
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center;
      padding: 40px 20px; 
      text-align: center;
    }

    /* Success styles (existing + new) */
    .checkmark-wrap {
      width: 90px; height: 90px; margin: 0 auto 24px;
      animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
      z-index: 4;
    }

    .success-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800; 
      color: var(--gold);
      margin-bottom: 6px;
      animation: fadeUp .6s .5s ease both;
    }

    .success-sub {
      font-size: 1rem; 
      color: rgba(249,245,236,0.7);
      animation: fadeUp .6s .65s ease both;
    }

    /* Rest of your existing styles unchanged */
    .bus-card, .actions, .spinner, .error-state { /* ... existing styles ... */ }
    @keyframes popIn, @keyframes strokeDraw, @keyframes fadeUp, @keyframes glowPulse { /* existing */ }
  </style>
</head>
<body>
  <div class="bg-slide s1"></div>
  <div class="bg-slide s2"></div>
  <div class="bg-overlay"></div>
  
  <!-- SHEEP RAIN -->
  <div id="sheepRain"></div>

  <main class="page">
    <!-- Loading state -->
    <div id="loadingState" class="loading-wrap">
      <div class="spinner"></div>
      <p style="color:rgba(249,245,236,0.6);margin-top:12px">Vérification du paiement…</p>
    </div>

    <!-- Success state -->
    <div id="successState" style="display:none; width:100%; flex-direction:column; align-items:center">
      <!-- Checkmark SVG -->
      <div class="checkmark-wrap">
        <svg viewBox="0 0 52 52" width="90" height="90">
          <circle class="checkmark-circle" cx="26" cy="26" r="25"/>
          <path class="checkmark-check" d="M14 27 l8 8 l16-16"/>
        </svg>
      </div>

      <h1 class="success-title">Place Confirmée !</h1>
      <p class="success-sub">Votre paiement a été validé avec succès.</p>

      <!-- FESTIVE TABASKI MESSAGE -->
      <div class="tabaski-message">
        Dewenaty ! <span class="emoji-blast">🐑🎉🥁</span><br>
        Bonne Fêtes de Tabaski !
      </div>

      <div class="bus-card">
        <div class="bus-number" id="busNum">–</div>
        <div class="bus-label">Votre Bus</div>
        <div class="divider-line"></div>
        <div class="passenger-name" id="paxName">–</div>
        <div class="passenger-info" id="paxPhone">–</div>
        <div class="seat-pill">
          🪑 Siège N° <span id="seatNum">–</span>
        </div>
      </div>

      <div class="actions">
        <a href="list.html" class="btn btn-gold">📋 Voir la Liste des Bus</a>
        <a href="index.html" class="btn btn-ghost">← Retour à l'accueil</a>
      </div>
    </div>

    <!-- Error state -->
    <div id="errorState" style="display:none;width:100%;display:none;flex-direction:column;align-items:center">
      <div class="error-state" id="errorMsg"></div>
      <div class="actions" style="margin-top:0">
        <a href="index.html" class="btn btn-ghost">← Retour à l'accueil</a>
      </div>
    </div>
  </main>

  <script>
    // ==================== SHEEP RAIN ANIMATION ====================
    function createSheep() {
      const sheep = document.createElement('div');
      sheep.className = 'sheep';
      sheep.textContent = ['🐑', '🐏', '🦙'][Math.floor(Math.random()*3)];
      
      const left = Math.random() * 100;
      sheep.style.left = `${left}vw`;
      sheep.style.top = `-${Math.random() * 60 + 10}px`;
      
      // Random fall duration + slight horizontal drift
      const duration = Math.random() * 4 + 3.5;
      sheep.style.animationDuration = `${duration}s`;
      
      // Random rotation & delay
      const delay = Math.random() * 2.5;
      sheep.style.animationDelay = `${delay}s`;
      
      // Slight side sway
      const sway = Math.random() * 80 - 40;
      sheep.style.setProperty('--sway', `${sway}px`);
      
      document.getElementById('sheepRain').appendChild(sheep);
      
      // Remove after animation
      setTimeout(() => {
        sheep.remove();
      }, (duration + delay) * 1000 + 1000);
    }

    function startSheepRain() {
      // Initial burst
      for (let i = 0; i < 35; i++) {
        setTimeout(() => createSheep(), i * 28);
      }
      
      // Continuous rain
      setInterval(() => {
        if (Math.random() > 0.3) createSheep();
      }, 80);
    }

    // ==================== EXISTING SCRIPT ====================
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const busNum = params.get('bus');
    const seatNum = params.get('seat');
    const name = params.get('name');

    async function init() {
      if (token && busNum && seatNum && name) {
        showSuccess({ 
          bus_number: busNum, 
          seat_number: seatNum, 
          name: decodeURIComponent(name), 
          phone: '' 
        });
        return;
      }

      if (token) {
        try {
          const res = await fetch('/api/confirm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token })
          });
          const data = await res.json();
          if (data.success) {
            showSuccess(data.reservation);
          } else {
            showError(data.error || 'Confirmation impossible.');
          }
        } catch(e) {
          showError('Erreur de connexion. Réessayez.');
        }
        return;
      }
      showError('Aucun token de réservation trouvé.');
    }

    function showSuccess(r) {
      document.getElementById('loadingState').style.display = 'none';
      const successEl = document.getElementById('successState');
      successEl.style.display = 'flex';
      
      document.getElementById('busNum').textContent = `Bus ${r.bus_number}`;
      document.getElementById('paxName').textContent = r.name;
      document.getElementById('paxPhone').textContent = r.phone ? `📱 ${r.phone}` : '';
      document.getElementById('seatNum').textContent = r.seat_number;

      // Launch the Tabaski celebration!
      setTimeout(() => {
        startSheepRain();
      }, 600);
    }

    function showError(msg) {
      document.getElementById('loadingState').style.display = 'none';
      const el = document.getElementById('errorState');
      el.style.display = 'flex';
      document.getElementById('errorMsg').textContent = '⚠️ ' + msg;
    }

    init();
  </script>
</body>
</html>
